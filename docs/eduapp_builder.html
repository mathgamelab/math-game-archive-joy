<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduApp Builder</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@15.0.12/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.6/dist/purify.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --mga-background: #ffffff;
      --mga-foreground: #262a33;
      --mga-primary: #2d323d;
      --mga-secondary: #f4f5f7;
      --mga-muted: #606b7d;
      --mga-accent: #467a66;
      --mga-border: #e2e5ea;
      --mga-clay-blue: #eef5ff;
      --mga-clay-orange: #fff4ec;
      --mga-clay-green: #eefbf4;
      --mga-clay-purple: #f4f0ff;
      --mga-shadow-card: 0 1px 2px rgba(15, 23, 42, 0.04), 0 8px 24px rgba(15, 23, 42, 0.05);
      --mga-shadow-hover: 0 4px 16px rgba(15, 23, 42, 0.08);
      --mga-shadow-modal: 0 16px 40px rgba(15, 23, 42, 0.14);
    }
    * {
      font-family: 'Pretendard', 'Noto Sans KR', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    body {
      background: var(--mga-background);
      color: var(--mga-foreground);
      -webkit-font-smoothing: antialiased;
    }
    h1, h2, h3 {
      letter-spacing: -0.02em;
    }
    .mga-header {
      border-bottom: 1px solid rgba(226, 229, 234, 0.8) !important;
      background: rgba(255, 255, 255, 0.92) !important;
      box-shadow: none !important;
      backdrop-filter: blur(12px);
    }
    .mga-card {
      border: 1px solid rgba(226, 229, 234, 0.8) !important;
      border-radius: 1rem;
      box-shadow: var(--mga-shadow-card) !important;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .mga-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--mga-shadow-hover) !important;
    }
    .mga-primary-button {
      border: 1px solid var(--mga-primary) !important;
      background: var(--mga-primary) !important;
      background-image: none !important;
      color: white !important;
      box-shadow: var(--mga-shadow-card) !important;
    }
    .mga-primary-button:hover {
      background: #252a33 !important;
      transform: translateY(-1px) !important;
      box-shadow: var(--mga-shadow-hover) !important;
    }
    .mga-secondary-button {
      border: 1px solid var(--mga-border) !important;
      background: white !important;
      color: var(--mga-foreground) !important;
      box-shadow: var(--mga-shadow-card) !important;
    }
    .mga-secondary-button:hover {
      background: var(--mga-secondary) !important;
      box-shadow: var(--mga-shadow-hover) !important;
    }
    #step-content .border-2 {
      border-width: 1px !important;
    }
    #step-content .shadow-lg,
    #step-content .shadow-xl,
    #step-content .shadow-2xl {
      box-shadow: var(--mga-shadow-card) !important;
    }
    #step-content .rounded-2xl.bg-white {
      border-color: var(--mga-border) !important;
      box-shadow: var(--mga-shadow-card) !important;
    }
    #step-content .bg-blue-50,
    #step-content .bg-cyan-50 {
      background-color: var(--mga-clay-blue) !important;
    }
    #step-content .bg-purple-50,
    #step-content .bg-pink-50 {
      background-color: var(--mga-clay-purple) !important;
    }
    #step-content .bg-green-50,
    #step-content .bg-emerald-50 {
      background-color: var(--mga-clay-green) !important;
    }
    #step-content .bg-orange-50,
    #step-content .bg-yellow-50 {
      background-color: var(--mga-clay-orange) !important;
    }
    #step-content button[class*="bg-gradient-to"] {
      border: 1px solid var(--mga-primary) !important;
      background: var(--mga-primary) !important;
      background-image: none !important;
      color: white !important;
      box-shadow: var(--mga-shadow-card) !important;
    }
    #step-content button[class*="bg-gradient-to"]:hover {
      background: #252a33 !important;
      transform: translateY(-1px) !important;
    }
    #step-content div[class*="bg-gradient-to"],
    #step-content span[class*="bg-gradient-to"] {
      background: var(--mga-secondary) !important;
      background-image: none !important;
    }
    #step-content input,
    #step-content textarea {
      border-width: 1px !important;
      border-color: var(--mga-border) !important;
      background: var(--mga-secondary);
    }
    #step-content input:focus,
    #step-content textarea:focus {
      background: white;
    }
    #step-content .text-purple-600,
    #step-content .text-blue-600,
    #step-content .text-indigo-600,
    #step-content .text-purple-700,
    #step-content .text-blue-700,
    #step-content .text-indigo-700 {
      color: var(--mga-primary) !important;
    }
    #step-content .text-green-600,
    #step-content .text-emerald-600,
    #step-content .text-green-700,
    #step-content .text-emerald-700 {
      color: var(--mga-accent) !important;
    }
    .markdown-preview { line-height: 1.75; overflow-wrap: anywhere; }
    .markdown-preview > :first-child { margin-top: 0; }
    .markdown-preview > :last-child { margin-bottom: 0; }
    .markdown-preview h1 { margin: 0 0 1rem; font-size: 1.75rem; font-weight: 800; line-height: 1.3; }
    .markdown-preview h2 { margin: 1.75rem 0 .75rem; border-bottom: 1px solid var(--mga-border); padding-bottom: .45rem; font-size: 1.35rem; font-weight: 750; }
    .markdown-preview h3 { margin: 1.4rem 0 .6rem; font-size: 1.12rem; font-weight: 700; }
    .markdown-preview p { margin: .75rem 0; }
    .markdown-preview ul, .markdown-preview ol { margin: .75rem 0; padding-left: 1.5rem; }
    .markdown-preview ul { list-style: disc; }
    .markdown-preview ol { list-style: decimal; }
    .markdown-preview li { margin: .25rem 0; }
    .markdown-preview blockquote { margin: 1rem 0; border-left: 4px solid var(--mga-accent); background: var(--mga-clay-green); padding: .75rem 1rem; color: #475569; }
    .markdown-preview code { border-radius: .3rem; background: #eef2f1; padding: .1rem .35rem; font-family: ui-monospace, SFMono-Regular, Consolas, monospace; font-size: .9em; }
    .markdown-preview pre { margin: 1rem 0; overflow-x: auto; border-radius: .75rem; background: #172033; padding: 1rem; color: #e2e8f0; }
    .markdown-preview pre code { background: transparent; padding: 0; color: inherit; }
    .markdown-preview table { width: 100%; margin: 1rem 0; border-collapse: collapse; }
    .markdown-preview th, .markdown-preview td { border: 1px solid var(--mga-border); padding: .55rem .7rem; text-align: left; }
    .markdown-preview th { background: var(--mga-secondary); font-weight: 700; }
    .markdown-preview a { color: var(--mga-accent); text-decoration: underline; }
    .field-markdown-preview :is(h1, h2, h3) {
      margin: 1.25rem 0 0.55rem;
      border-bottom: 0;
      padding-bottom: 0;
      font-size: 1.08rem;
      font-weight: 750;
      line-height: 1.45;
    }
    .field-markdown-preview > :is(h1, h2, h3):first-child {
      margin-top: 0;
      border-bottom: 1px solid var(--mga-border);
      padding-bottom: 0.65rem;
      font-size: 1.35rem;
      font-weight: 800;
    }
    .field-markdown-preview p,
    .field-markdown-preview li {
      font-size: 0.95rem;
      line-height: 1.75;
    }
    #step-content h2 {
      color: var(--mga-foreground) !important;
      font-weight: 600 !important;
    }
    #step-content h3 {
      font-weight: 600 !important;
    }
    .mga-clay-purple { background: var(--mga-clay-purple) !important; }
    .mga-clay-blue { background: var(--mga-clay-blue) !important; }
    .mga-clay-green { background: var(--mga-clay-green) !important; }
    .mga-clay-orange { background: var(--mga-clay-orange) !important; }
    [role="dialog"] > div > div:first-child,
    [role="dialog"] button[class*="bg-gradient-to"] {
      background: var(--mga-primary) !important;
      background-image: none !important;
    }
    [role="dialog"] .border-2 {
      border-width: 1px !important;
      border-color: var(--mga-border) !important;
    }
    [role="dialog"] input,
    [role="dialog"] textarea {
      border-width: 1px !important;
      border-color: var(--mga-border) !important;
      background: var(--mga-secondary) !important;
    }
    @keyframes slide-in-from-right {
      from {
        opacity: 0;
        transform: translateX(1rem);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }
    @keyframes slide-in-from-bottom {
      from {
        opacity: 0;
        transform: translateY(0.5rem);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .animate-in {
      animation: slide-in-from-right 0.3s ease-out;
    }
    .slide-in-from-bottom-2 {
      animation: slide-in-from-bottom 0.2s ease-out;
    }
    .slide-in-from-bottom-5 {
      animation: slide-in-from-bottom 0.5s ease-out;
    }
    @keyframes lightbulb-twinkle {
      0%, 100% {
        box-shadow: 0 0 0 0 rgba(255, 239, 0, 0), 0 0 0 0 rgba(255, 239, 0, 0);
        transform: scale(1);
      }
      50% {
        box-shadow: 0 0 20px 8px rgba(255, 239, 0, 0.6), 0 0 40px 16px rgba(255, 239, 0, 0.3);
        transform: scale(1.05);
      }
    }
    .lightbulb-twinkle {
      animation: lightbulb-twinkle 1.2s ease-in-out infinite;
    }
    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: var(--mga-secondary);
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: var(--mga-border);
      border-radius: 3px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: var(--mga-muted);
    }
    input, textarea {
      font-size: 16px !important;
    }
    input:focus, textarea:focus {
      outline: none !important;
      border-color: var(--mga-primary) !important;
      box-shadow: 0 0 0 3px rgba(45, 50, 61, 0.12) !important;
    }
  </style>
</head>
<body>
  <div id="app" class="min-h-screen bg-white font-sans text-[#262A33] flex flex-col">
    <!-- Header -->
    <header class="mga-header sticky top-0 z-30">
      <div class="max-w-4xl mx-auto px-4 sm:px-6 h-14 sm:h-16 flex items-center justify-between">
        <div class="flex items-center gap-2 sm:gap-3">
          <img src="/images/math_game_logo.png" alt="" class="h-7 sm:h-9 w-auto select-none" />
          <h1 class="text-xl sm:text-2xl font-extrabold tracking-tight text-[#262A33] whitespace-nowrap">EduApp Builder</h1>
        </div>
        <div class="flex items-center gap-2 sm:gap-3">
          <!-- 커뮤니티 드롭다운 메뉴 -->
          <div class="relative">
            <button onclick="toggleCommunityMenu()" aria-haspopup="true" aria-expanded="false" class="px-3 py-2 text-sm font-medium rounded-lg flex items-center gap-2 transition shadow-sm whitespace-nowrap h-9" style="background-color: #FEE500; color: #000000;">
              <svg class="w-4 h-4 flex-shrink-0" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 3c5.799 0 10.5 3.664 10.5 8.185 0 4.52-4.701 8.184-10.5 8.184a13.5 13.5 0 0 1-1.727-.11l-4.408 2.883c-.501.265-.678.236-.472-.413l.892-3.678c-2.88-1.46-4.785-3.99-4.785-6.866C1.5 6.665 6.201 3 12 3z"/>
              </svg>
              <span>커뮤니티</span>
            </button>
            <div id="community-dropdown" class="hidden absolute right-0 mt-2 bg-white rounded-xl z-50 overflow-hidden" style="min-width: 220px; width: auto; border: 1px solid var(--mga-border); box-shadow: var(--mga-shadow-modal);">
              <a href="https://open.kakao.com/o/gqbARj9h" target="_blank" rel="noopener noreferrer" class="block px-4 py-2 text-black hover:bg-slate-50 transition-colors text-sm font-medium whitespace-nowrap text-center">
                제작자 카톡방
              </a>
              <a href="https://open.kakao.com/o/gVSDtSIh" target="_blank" rel="noopener noreferrer" class="block px-4 py-2 text-black hover:bg-slate-50 transition-colors text-sm font-medium border-t border-slate-100 text-center">
                개발자 단톡방<br><span style="background-color: #fef08a; color: #000000; padding: 2px 6px; border-radius: 4px; font-weight: 600; display: inline-block;">입장코드:vibe</span>

        </div>
      </div>
      <!-- Step Progress Indicator -->
      <div class="w-full px-3 sm:px-6 py-3 sm:py-5 bg-white overflow-x-auto border-t border-[#E2E5EA]/70">
        <div class="max-w-4xl mx-auto min-w-0">
          <div id="step-indicator" class="flex items-center justify-between relative">
            <!-- Steps will be generated here -->

    <!-- Main Content -->

      <div id="step-content"></div>

    <!-- Navigation Buttons -->

        <button id="prev-btn-mobile" onclick="prevStep()" aria-label="이전 단계" class="mga-secondary-button inline-flex items-center justify-center rounded-full text-sm font-semibold transition-all h-12 w-12 px-0 disabled:opacity-40 disabled:pointer-events-none disabled:cursor-not-allowed">
          <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">

          </svg>
        </button>
        <button id="next-btn-mobile" onclick="nextStep()" aria-label="다음 단계" class="mga-primary-button inline-flex items-center justify-center rounded-full text-sm font-bold transition-all h-12 w-12 px-0 disabled:opacity-40 disabled:pointer-events-none">
          <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">

        <button id="prev-btn" onclick="prevStep()" aria-label="이전 단계" class="mga-secondary-button inline-flex items-center justify-center rounded-full text-base font-semibold transition-all h-14 w-14 px-0 disabled:opacity-40 disabled:pointer-events-none disabled:cursor-not-allowed">
          <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />

          <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">

          </svg>

    <!-- AI Idea Booster (Floating) -->
    <div id="idea-booster-container"></div>

  <script>
    // Global State
    let currentStep = 1;
    let lightbulbClicked = false; // 전구 버튼 클릭 여부
    let step4Timer = null; // Step 4 타이머
    let isGeneratingPrompt = false;
    let promptError = '';
    let generationRequestId = 0;
    let isPromptEditing = false;
    const markdownFieldPreview = { features: false, vibe: false };
    const EMPTY_AI_GENERATION_TYPES = new Set(['features', 'vibe', 'workflow', 'rules']);

    // Upstage Solar via Firebase callable (math-reading)
    const CALL_SOLAR_URL = 'https://asia-northeast3-math-reading.cloudfunctions.net/callSolar';
    const SOLAR_MODEL = 'solar-pro3';
    const SOLAR_TIMEOUT_MS = 60000;
    const DRAFT_STORAGE_KEY = 'eduappBuilderDraftV2';

    async function callSolar(prompt, options = {}) {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), options.timeout || SOLAR_TIMEOUT_MS);

      try {
        const response = await fetch(CALL_SOLAR_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          signal: controller.signal,
          body: JSON.stringify({
            data: {
              prompt,
              model: options.model || SOLAR_MODEL,
              ...(options.temperature != null ? { temperature: options.temperature } : {}),
            },
          }),
        });

        const payload = await response.json().catch(() => ({}));
        if (!response.ok || payload.error) {
          const err = payload.error;
          const msg = (err && (err.message || err.status)) || `API 오류: ${response.status}`;
          throw new Error(typeof msg === 'string' ? msg : 'Solar 호출에 실패했습니다.');
        }
        const reply = payload.result && payload.result.reply;
        if (!reply) throw new Error('응답이 비어 있습니다.');
        return String(reply).trim();
      } catch (error) {
        if (error.name === 'AbortError') {
          throw new Error('AI 응답 시간이 초과되었습니다. 잠시 후 다시 시도해주세요.');
        }
        throw error;
      } finally {
        clearTimeout(timeoutId);
      }
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function stripMarkdownFormatting(value) {
      return String(value ?? '')
        .replace(/```(?:\w+)?\s*([\s\S]*?)```/g, '$1')
        .replace(/!\[([^\]]*)\]\([^)]+\)/g, '$1')
        .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')
        .replace(/^#{1,6}\s+/gm, '')
        .replace(/^>\s?/gm, '')
        .replace(/^\s*[-*+]\s+/gm, '• ')
        .replace(/(\*\*|__)(.*?)\1/g, '$2')
        .replace(/~~(.*?)~~/g, '$1')
        .replace(/(^|[^*])\*([^*\n]+)\*(?!\*)/g, '$1$2')
        .replace(/(^|[^_])_([^_\n]+)_(?!_)/g, '$1$2')
        .replace(/`([^`]+)`/g, '$1')
        .replace(/[ \t]+$/gm, '')
        .trim();
    }

    function renderBasicMarkdown(value) {
      const renderInline = (text) => escapeHtml(text)
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/__(.+?)__/g, '<strong>$1</strong>')
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\*([^*\n]+)\*/g, '<em>$1</em>');
      const lines = String(value ?? '').split('\n');
      let html = '';
      let listType = '';
      const closeList = () => {
        if (!listType) return;
        html += `</${listType}>`;
        listType = '';
      };

      lines.forEach((line) => {
        const unordered = line.match(/^\s*[-*+]\s+(.+)/);
        const ordered = line.match(/^\s*\d+[.)]\s+(.+)/);
        if (unordered || ordered) {
          const nextListType = unordered ? 'ul' : 'ol';
          if (listType !== nextListType) {
            closeList();
            listType = nextListType;
            html += `<${listType}>`;
          }
          html += `<li>${renderInline((unordered || ordered)[1])}</li>`;
          return;
        }

        closeList();
        const heading = line.match(/^(#{1,3})\s+(.+)/);
        if (heading) {
          const level = heading[1].length;
          html += `<h${level}>${renderInline(heading[2])}</h${level}>`;
        } else if (line.trim()) {
          html += `<p>${renderInline(line)}</p>`;
        }
      });
      closeList();
      return html;
    }

    function renderMarkdown(value) {
      let source = String(value ?? '').trim();
      if (source.startsWith('"') && source.endsWith('"')) {
        source = source.slice(1, -1).replace(/\\n/g, '\n').replace(/\\"/g, '"');
      }
      if (!window.marked || !window.DOMPurify) {
        return renderBasicMarkdown(source);
      }
      const rendered = window.marked.parse(source, { gfm: true, breaks: true });
      return window.DOMPurify.sanitize(rendered, { USE_PROFILES: { html: true } });
    }

    function toggleMarkdownField(field) {
      if (field !== 'features' && field !== 'vibe') return;
      markdownFieldPreview[field] = !markdownFieldPreview[field];
      renderStep();
    }

    function showNotice(message, type = 'error') {
      document.getElementById('app-notice')?.remove();
      const notice = document.createElement('div');
      notice.id = 'app-notice';

      notice.className = `fixed top-4 left-1/2 -translate-x-1/2 z-[100] max-w-[calc(100vw-2rem)] rounded-xl px-5 py-3 text-sm font-bold text-white ${

    function updateAICoachButtons(field) {
      const fieldMap = {
        painPoint: 'painPoint',
        vibe: 'vibe',
        features: 'features',
        solution: 'solutionMethod',
        rules: 'rules',
        workflow: 'workflow'
      };
      
      // 해당 필드와 관련된 모든 coach 버튼 찾기
      const coachButtons = document.querySelectorAll('[id^="coach-"][id$="-btn"]');
      coachButtons.forEach(btn => {
        const coachId = btn.id.replace('-btn', '');
        const type = coachId.split('-')[1]; // coach-painPoint-123456 -> painPoint
        const relatedField = fieldMap[type] || type;
        
        if (relatedField === field) {
          const currentValue = formData[field] || '';
          const hasContent = currentValue.trim() !== '';
          
          if (hasContent || EMPTY_AI_GENERATION_TYPES.has(type)) {
            btn.disabled = false;
            btn.classList.remove('opacity-50', 'cursor-not-allowed');
          } else {
            btn.disabled = true;
            btn.classList.add('opacity-50', 'cursor-not-allowed');
          }
        }
      });
    }

        html += `<div class="absolute top-3 sm:top-5 left-0 h-px bg-[#467A66] z-0 transition-all duration-500" style="width: ${completedWidth}%"></div>`;

      // 단계별 원형 아이콘

    // AI 조언 버튼 클릭 핸들러
    async function handleAICoach(coachId, type, field) {
      const currentValue = formData[field] || '';
      const canGenerateWithoutContent = EMPTY_AI_GENERATION_TYPES.has(type);
      if (!currentValue.trim() && !canGenerateWithoutContent) {
        showNotice('내용을 먼저 입력해주세요.');
        return;
      }

      const panel = document.getElementById(coachId + '-panel');
      const contentDiv = document.getElementById(coachId + '-content');
      const btn = document.getElementById(coachId + '-btn');
      
      if (!panel || !contentDiv) return;

      // 패널 열기
      if (panel.classList.contains('hidden')) {
        panel.classList.remove('hidden');
      }

      // 로딩 상태 표시
      contentDiv.innerHTML = `
        <div class="text-center py-4">
          <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-purple-600 mx-auto mb-3"></div>
          <p class="text-sm text-slate-600">AI가 내용을 개선하고 있습니다...</p>
        </div>
      `;
      
      if (btn) {
        btn.disabled = true;
        btn.classList.add('opacity-50', 'cursor-not-allowed');
      }

      // AI 개선 요청
      const improvedText = await improveWithAI(type, currentValue);
      
      if (improvedText) {
        // 개선된 내용 표시
        contentDiv.innerHTML = `
          <div class="space-y-4">
            <div class="bg-gradient-to-br from-green-50 to-emerald-50 p-4 rounded-xl border-2 border-green-200">

      const requirements = {
        1: [['toolType', '도구 유형을 선택해주세요.']],
        2: [['painPoint', '평소의 어려움이나 반복되는 일을 입력해주세요.']],
        3: [
          ['intent', '해결하려는 문제를 입력해주세요.'],
          ['solutionMethod', '해결 방법을 입력해주세요.'],
        ],
        4: [
          ['features', '주요 기능을 입력해주세요.'],
          ['vibe', '디자인 분위기를 입력해주세요.'],
          ['workflow', '작동 과정을 입력해주세요.'],
        ],
      };
      const missing = (requirements[step] || []).find(([field]) => !String(formData[field] || '').trim());
      if (!missing) return true;
      showNotice(missing[1]);
      return false;
    }

    function nextStep() {

        return;
      }

      if (!validateStep(currentStep)) return;
      
      if (currentStep < 6) {
        // Step 4가 아니면 타이머 정리
        if (currentStep !== 4 && step4Timer) {
          clearTimeout(step4Timer);
          step4Timer = null;
        }
        
        currentStep++;
        saveDraft();
        
        // Step 5 진입 시 AI 자동 정리 로직

        saveDraft();

    function assessGeneratedPromptQuality(text, level, sourceLength) {
      const issues = [];
      const minimumLength = level === 'beginner'
        ? Math.max(2400, Math.min(5000, Math.round(sourceLength * 1.25)))
        : 2800;

      if (text.trim().length < minimumLength) {
        issues.push(`결과가 너무 짧음 (${text.trim().length}자, 최소 ${minimumLength}자 필요)`);
      }

      if (level === 'beginner') {
        const requiredSections = [
          ['사용자 요구사항 원문', /사용자\s*요구사항\s*원문|요구사항\s*원문/],
          ['화면 및 컴포넌트', /화면[\s\S]{0,30}컴포넌트|컴포넌트[\s\S]{0,30}화면/],
          ['상태와 데이터 구조', /상태[\s\S]{0,30}데이터|데이터[\s\S]{0,30}상태/],
          ['입력 검증', /입력\s*검증|유효성\s*검사/],
          ['오류 처리', /오류\s*처리|에러\s*처리/],
          ['반응형', /반응형/],
          ['접근성', /접근성|aria-/i],
          ['테스트 또는 완료 조건', /테스트|완료\s*조건/],
          ['요구사항 반영 체크리스트', /요구사항[\s\S]{0,30}체크리스트|반영\s*체크리스트/],
        ];
        requiredSections.forEach(([label, pattern]) => {
          if (!pattern.test(text)) issues.push(`필수 섹션 누락: ${label}`);
        });
      }
      return issues;
    }

                  <pre class="bg-white p-4 rounded-lg text-sm whitespace-pre-wrap border border-purple-100 max-h-[300px] overflow-y-auto">${structureExample.features}</pre>
                </div>
                
                <div class="bg-blue-50 p-4 rounded-lg border-2 border-blue-200">
                  <h4 class="text-base font-bold text-blue-900 mb-3">UI & Vibe 예시:</h4>
                  <pre class="bg-white p-4 rounded-lg text-sm whitespace-pre-wrap border border-blue-100 max-h-[300px] overflow-y-auto">${structureExample.ui}</pre>
                </div>
                
                <div class="bg-slate-50 p-4 rounded-lg border-2 border-slate-200">
                  <p class="text-sm text-slate-700"><strong>💡 팁:</strong> 위 예시를 참고하여 ${escapeHtml(formData.toolType)}에 맞게 구조를 정리해보세요. 각 섹션을 명확하게 구분하고, 실제 사용 시나리오를 고려하여 작성하면 더 좋습니다.</p>
                </div>
              </div>
            </div>
          </div>
          
          <!-- 모달 푸터 (저장 버튼) -->
          <div class="bg-slate-100 px-6 py-4 flex justify-end gap-4 border-t-2 border-slate-300">
            <button onclick="closeExampleModal(5)" class="px-6 py-2 bg-slate-300 hover:bg-slate-400 text-slate-900 font-bold rounded-lg transition-all">
              취소
            </button>
            <button onclick="saveModalChanges(5)" class="px-6 py-2 bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-700 hover:to-pink-700 text-white font-bold rounded-lg shadow-lg hover:shadow-xl transition-all transform hover:scale-105">
              저장
            </button>
          </div>
        </div>
      `;
      
      // body 스크롤 방지
      document.body.style.overflow = 'hidden';
      
      // 모달 열기 애니메이션
      requestAnimationFrame(() => {
        modal.classList.remove('opacity-0');
        modal.classList.add('opacity-100');
      });
      }
    }
    
    // 모달 닫기 함수
    function closeExampleModal(step) {
      const modalId = `example-modal-fullscreen-${step}`;
      const modal = document.getElementById(modalId);
      if (modal) {
        modal.classList.remove('opacity-100');
        modal.classList.add('opacity-0');
        setTimeout(() => {
          modal.remove();
          // body 스크롤 복원
          document.body.style.overflow = '';
        }, 300);
      }
    }
    
    // 모달 변경사항 저장 함수
    function saveModalChanges(step) {
      if (step === 4) {
        const userInfoEdit = document.getElementById('modal-userInfo-edit');
        const featuresEdit = document.getElementById('modal-features-edit-4');
        const vibeEdit = document.getElementById('modal-vibe-edit-4');
        const workflowEdit = document.getElementById('modal-workflow-edit-4');
        
        if (userInfoEdit) formData.userInfo = userInfoEdit.value;
        if (featuresEdit) formData.features = featuresEdit.value;
        if (vibeEdit) formData.vibe = vibeEdit.value;
        if (workflowEdit) formData.workflow = workflowEdit.value;
        saveDraft();
        
        // step 4 다시 렌더링
        renderStep();
        
        // 모달 닫기
        closeExampleModal(4);
      } else if (step === 5) {
        const featuresEdit = document.getElementById('modal-features-edit');
        const uiEdit = document.getElementById('modal-ui-edit');
        
        if (featuresEdit && uiEdit) {
          formData.structuredData.features = featuresEdit.value;
          formData.structuredData.ui = uiEdit.value;
          saveDraft();
          
          // step 5 다시 렌더링
          renderStep();
          
          // 모달 닫기
          closeExampleModal(5);
        }
      }
    }

    document.addEventListener('keydown', (event) => {
      if (event.key !== 'Escape') return;
      const openModal = document.querySelector('[id^="example-modal-fullscreen-"]');
      if (openModal) {
        const step = Number(openModal.id.split('-').pop());
        closeExampleModal(step);
      }
    });

    // Initialize
    restoreDraft();
    renderStep();
    updateProgress();
    if (currentStep === 6 && formData.promptLevel && !formData.geminiPrompt) {
      generatePromptWithSolar();
    }
  </script>

</body>
</html>
