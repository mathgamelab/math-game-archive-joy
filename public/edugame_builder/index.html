    .markdown-preview p { margin: .75rem 0; }
    .markdown-preview ul, .markdown-preview ol { margin: .75rem 0; padding-left: 1.5rem; }
    .markdown-preview ul { list-style: disc; }
    .markdown-preview ol { list-style: decimal; }
    .markdown-preview li { margin: .25rem 0; }
    .markdown-preview blockquote { margin: 1rem 0; border-left: 4px solid var(--mga-accent); background: var(--mga-accent-soft); padding: .75rem 1rem; color: #475569; }

    .markdown-preview table { width: 100%; margin: 1rem 0; border-collapse: collapse; }

    .markdown-preview th { background: var(--mga-clay); font-weight: 700; }
    .markdown-preview a { color: #47705a; text-decoration: underline; }
    @keyframes twinkle {
      0%, 100% { box-shadow: 0 0 0 0 rgba(111, 143, 114, 0); transform: scale(1); }
      50% { box-shadow: 0 0 18px 7px rgba(111, 143, 114, .28); transform: scale(1.08); }
    }
    .animate-twinkle {
      animation: twinkle 1.5s ease-in-out infinite;
    }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    .custom-scrollbar::-webkit-scrollbar { width: 8px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: #f8fafc; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; border: 2px solid #f8fafc; }
