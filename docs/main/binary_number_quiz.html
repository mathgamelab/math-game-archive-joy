
<!doctype html>
<html lang="ko" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>이진수 탐색기</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <!-- 폭죽 애니메이션 라이브러리 -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }

    /* 탭 전환 등장 애니메이션 */
    .fade-in-up { animation: fadeInUp 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* 오답 시 흔들림 애니메이션 */
    .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
    @keyframes shake {
      10%, 90% { transform: translate3d(-1px, 0, 0); }
      20%, 80% { transform: translate3d(2px, 0, 0); }
      30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
      40%, 60% { transform: translate3d(4px, 0, 0); }
    }

    /* 콤보 & 칭호 애니메이션 */
    .combo-pop { animation: comboPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
    @keyframes comboPop {
      0% { transform: scale(0.5); opacity: 0; }
      50% { transform: scale(1.15); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }
    .title-pop { animation: titlePop 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55) forwards; }
    @keyframes titlePop {
      0% { transform: translateY(20px) scale(0.8); opacity: 0; }
      100% { transform: translateY(0) scale(1); opacity: 1; }
    }

    /* 카드 애니메이션 */
    .card-flip {
      cursor: pointer; border-radius: 16px; display: flex;
      align-items: center; justify-content: center; transition: all 0.2s;
    }
    .card-flip:hover { transform: translateY(-2px); }

    .bit-card { transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
    .bit-card:hover { transform: translateY(-4px); box-shadow: 0 8px 16px rgba(255, 154, 86, 0.2); }
    .bit-card.active { box-shadow: 0 0 24px rgba(255, 154, 86, 0.4); }

    /* 정답 반전 모드 강조 클래스 */
    .bit-card.reveal-active {
      background: #ffffff !important;
      color: #ff512f !important;
      border: 3px solid #ffffff !important;
      box-shadow: 0 0 30px rgba(255, 255, 255, 0.8) !important;
      transform: scale(1.05) !important;
      z-index: 10;
    }
    .bit-card.reveal-inactive {
      background: #2d1f18 !important; 
      color: #8b6f47 !important;     
      border: 2px solid #4a3225 !important;
      box-shadow: none !important;
      opacity: 0.7 !important;       
      transform: scale(0.95) !important;
    }

    .flip-in { animation: flipIn 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55) both; }
    @keyframes flipIn {
      0% { transform: rotateY(-90deg) scale(0.8); opacity: 0; }
      100% { transform: rotateY(0deg) scale(1); opacity: 1; }
    }

    .card-state-change { animation: cardFlipPage 0.4s ease-in-out both; }
    @keyframes cardFlipPage {
      0% { transform: translateX(0) rotateY(0deg); opacity: 1; }
      50% { transform: translateX(-15px) rotateY(90deg); opacity: 0; }
      100% { transform: translateX(0) rotateY(0deg); opacity: 1; }
    }

    .number-pop { animation: numberPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
    @keyframes numberPop {
      0% { transform: scale(0.8); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .success-pulse { animation: successPulse 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
    @keyframes successPulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); box-shadow: 0 0 30px rgba(34, 197, 94, 0.6); }
      100% { transform: scale(1); }
    }

    .progress-fill { transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1); }

    .arrow-btn {
      width: 70px !important; height: 70px !important;
      border: none !important; background: transparent !important;
      cursor: pointer !important; display: flex !important;
      align-items: center !important; justify-content: center !important;
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1) !important; padding: 0 !important;
    }
    .arrow-btn:hover { transform: scale(1.1); }
    .arrow-btn:active { transform: scale(0.95); }
    
    .arrow-btn svg {
      width: 70px; height: 70px; stroke: #ff9a56; stroke-width: 3; fill: none;
      stroke-linecap: round; stroke-linejoin: round;
      animation: arrowGlow 2s ease-in-out infinite;
    }
    
    @keyframes arrowGlow {
      0%, 100% { filter: drop-shadow(0 0 8px rgba(255, 154, 86, 0.6)); }
      50% { filter: drop-shadow(0 0 20px rgba(255, 154, 86, 0.9)); }
    }
    
    .arrow-btn:hover svg { animation: none; filter: drop-shadow(0 0 24px rgba(255, 154, 86, 1)); }

    .bit-text { font-family: 'JetBrains Mono', monospace; font-size: 56px; font-weight: 700; line-height: 1; }

    @media (max-width: 768px) {
      #learnCards { gap: 10px !important; flex-wrap: nowrap !important; }
      .card-flip { width: 0 !important; flex: 1 !important; height: 130px !important; }
      .bit-text { font-size: 40px !important; }
      .val-text { font-size: 16px !important; }
      #learnNumDisplay { font-size: 60px !important; }
      
      #buildCards { gap: 8px !important; flex-wrap: nowrap !important; }
      .bit-card { width: 0 !important; flex: 1 !important; height: 150px !important; }
      #buildControlPanel { flex-direction: column !important; gap: 10px !important; }
      #buildControlPanel button { width: 100% !important; margin-left: 0 !important; }
      .arrow-btn { width: 56px !important; height: 56px !important; }
      .arrow-btn svg { width: 56px; height: 56px; }
      .mode-tabs { padding: 12px 12px 6px; gap: 6px; }
    }

    /* [완벽 해결] 모바일 화면 한 줄 고정 CSS */
    .title-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 8px;
    }
    .title-mascot {
      width: 56px;
      height: 56px;
      object-fit: contain;
      flex-shrink: 0;
      filter: drop-shadow(0 2px 6px rgba(210, 80, 0, 0.35));
      user-select: none;
      pointer-events: none;
    }
    .explain-binary {
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(22px, 7vw, 40px);
      font-weight: 700;
      color: #ff9a56;
      letter-spacing: 0.12em;
      word-break: break-all;
    }
    .quiz-binary, .quiz-decimal {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      color: #fff8f0;
      word-break: break-all;
    }
    .quiz-binary { font-size: clamp(26px, 8vw, 42px); letter-spacing: 0.1em; }
    .quiz-decimal { font-size: clamp(30px, 9vw, 48px); }
    .mode-tabs {
      display: flex;
      gap: 8px;
      padding: 16px 20px 8px;
    }
    .mode-tabs .mode-tab { min-height: 44px; }
    .creator-info {
      flex-shrink: 0;
      position: relative;
      text-align: center;
      color: #c4b5a5;
      font-size: 0.8rem;
      background: #140c08;
      padding: 10px 16px calc(10px + env(safe-area-inset-bottom));
      border-top: 1px solid #4a3225;
      margin-top: 24px;
    }
    .creator-info p { margin: 0; display: inline; }
    .creator-info .sep { margin: 0 0.45em; color: #8b6f47; }

    @media (max-width: 480px) {
      #mainTitle { font-size: 20px !important; }
      #subtitleText { font-size: 12px !important; }
      .title-row { gap: 8px; margin-bottom: 6px; }
      .title-mascot { width: 44px; height: 44px; }
      .creator-info { font-size: 0.72rem; padding: 8px 10px calc(8px + env(safe-area-inset-bottom)); }
      
      /* flex-wrap: nowrap을 강제하여 무조건 1줄로 만듦 */
      #learnCards { gap: 4px !important; flex-wrap: nowrap !important; width: 100%; }
      /* 너비를 %나 비율로 나누어 가득 차게 설정 */
      .card-flip { width: 0 !important; flex: 1 !important; height: 100px !important; border-radius: 8px !important; padding: 2px !important; min-width: 0; }
      
      .bit-text { font-size: 24px !important; line-height: 1 !important; }
      .val-text { font-size: 10px !important; line-height: 1 !important; }
      
      #learnNumDisplay { font-size: 36px !important; min-width: 44px !important; }
      .arrow-btn { width: 44px !important; height: 44px !important; }
      .arrow-btn svg { width: 44px; height: 44px; }
      
      /* 직접 만들기 카드도 1줄로 강제 */
      #buildCards { gap: 4px !important; flex-wrap: nowrap !important; width: 100%; }
      .bit-card { width: 0 !important; flex: 1 !important; height: 100px !important; gap: 2px !important; padding: 2px !important; border-radius: 8px !important; min-width: 0; }
      
      .build-bit-text { font-size: 24px !important; line-height: 1 !important; }
      .power-div { font-size: 10px !important; height: 16px !important; }
      
      #buildResult { font-size: 32px !important; }
      #buildFormula { font-size: 12px !important; }
      
      #quizOptions { grid-template-columns: 1fr !important; }
      #quizOptions button { min-height: 48px; }
      .mode-tabs { flex-wrap: wrap; }
      .mode-tab { padding: 10px 6px !important; font-size: 12px !important; flex: 1 1 30%; }
      
      #buildControlPanel { flex-direction: column; gap: 10px; }
      #buildControlPanel button { width: 100%; margin-left:0 !important; min-height: 44px; }
      #app > div[style*="padding:16px 20px"] { padding-left: 12px !important; padding-right: 12px !important; }
    }
  </style>
 </head>
 <body class="h-full" style="margin:0; font-family:'Noto Sans KR',sans-serif; background:#1a0f0a; color:#f5ede5;">
  <div id="app" class="h-full w-full overflow-auto">
   
   <!-- Header -->
   <div style="background:linear-gradient(135deg, #ffb380 0%, #ff8c4a 100%); border-bottom:1px solid #f9853a; padding:28px 20px 20px; text-align:center; box-shadow: 0 6px 20px rgba(255, 140, 74, 0.15);">
    <div class="title-row">
     <h1 id="mainTitle" style="font-family:'Noto Sans KR', sans-serif; font-size:32px; font-weight:900; color:#ffffff; margin:0; letter-spacing:-1px; text-shadow: 0 2px 5px rgba(210, 80, 0, 0.35);">이진수 탐색기</h1>
     <img src="images/sutam.png" alt="" class="title-mascot" width="56" height="56" draggable="false" />
    </div>
    <p id="subtitleText" style="font-size:16px; font-weight:700; color:#fffdfa; margin:0; text-shadow: 0 1px 3px rgba(210, 80, 0, 0.25);">0부터 31까지, 카드를 뒤집어 이진수를 배워보세요!</p>
   </div>
   
   <!-- Mode Tabs -->
   <div class="mode-tabs">
    <button onclick="switchMode('learn')" id="tab-learn" class="mode-tab" style="flex:1; padding:12px; border-radius:12px; border:2px solid #ff9a56; background:#ff9a5620; color:#ff9a56; font-weight:600; font-size:16px; cursor:pointer; transition: 0.2s;"> Σ 카드 학습 </button> 
    <button onclick="switchMode('build')" id="tab-build" class="mode-tab" style="flex:1; padding:12px; border-radius:12px; border:2px solid #4a3225; background:transparent; color:#8b6f47; font-weight:600; font-size:16px; cursor:pointer; transition: 0.2s;"> ± 직접 만들기 </button> 
    <button onclick="switchMode('quiz')" id="tab-quiz" class="mode-tab" style="flex:1; padding:12px; border-radius:12px; border:2px solid #4a3225; background:transparent; color:#8b6f47; font-weight:600; font-size:16px; cursor:pointer; transition: 0.2s;"> ✓ 퀴즈 </button>
   </div>

   <!-- LEARN MODE -->
   <div id="mode-learn" class="mode-section fade-in-up" style="padding:16px 20px; display:block;">
    <div style="display:flex; align-items:center; justify-content:center; gap:20px; margin-bottom:20px;">
     <button id="prevBtn" onclick="changeLearnNum(-1)" class="arrow-btn" title="이전">
      <svg viewbox="0 0 24 24"><polyline points="15 18 9 12 15 6"></polyline></svg>
     </button>
     <div id="learnNumDisplay" style="font-family:'JetBrains Mono',monospace; font-size:80px; font-weight:700; color:#fff8f0; min-width:100px; text-align:center;">0</div>
     <button id="nextBtn" onclick="changeLearnNum(1)" class="arrow-btn" title="다음">
      <svg viewbox="0 0 24 24"><polyline points="9 18 15 12 9 6"></polyline></svg>
     </button>
    </div>
    <div id="learnCards" style="display:flex; justify-content:center; gap:16px; margin-bottom:20px; min-height:180px; align-items:center;"></div>
    <div id="learnExplain" style="background:#2d1f18; border-radius:16px; padding:16px; border:1px solid #4a3225;"></div>
   </div>

   <!-- BUILD MODE -->
   <div id="mode-build" class="mode-section" style="padding:16px 20px; display:none;">
    <div id="buildControlPanel" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; max-width: 800px; margin-left: auto; margin-right: auto;">
      <div id="missionDisplay" style="flex:1; font-size:18px; font-weight:700; color:#ff9a56; background:#2d1f18; padding:12px 20px; border-radius:12px; border:2px solid #ff9a56; text-align:center; transition: all 0.3s; display:flex; justify-content:center; align-items:center;">
        🎯 목표: <span id="missionTarget" style="font-size:24px; margin: 0 8px;">?</span> 일 만들기
      </div>
      <button id="hardModeBtn" onclick="toggleHardMode()" style="margin-left:12px; padding:14px 20px; border-radius:12px; border:2px solid #4a3225; background:transparent; color:#8b6f47; font-weight:700; font-size:14px; cursor:pointer; transition: all 0.3s; white-space:nowrap;">
        🔥 하드 모드 OFF
      </button>
    </div>

    <!-- 카드 컨테이너 -->
    <div id="buildCards" style="display:flex; justify-content:center; gap:10px; margin-bottom:24px; min-height:180px;"></div>
    
    <div style="text-align:center; min-height: 130px;">
     <!-- 일반 모드 합계 표시 영역 -->
     <div id="normalModeArea" style="display:block;">
       <div style="color:#8b6f47; font-size:13px; margin-bottom:4px;">현재 내 카드 합계</div>
       <div id="buildResult" style="font-family:'JetBrains Mono',monospace; font-size:52px; font-weight:700; color:#ff9a56;">0</div>
       <div id="buildFormula" style="font-family:'JetBrains Mono',monospace; font-size:24px; color:#8b6f47; margin-top:8px; min-height:36px;">비트를 켜 보세요!</div>
     </div>

     <!-- 하드 모드 제출 영역 -->
     <div id="hardModeArea" style="display:none; flex-direction:column; align-items:center; gap:12px;">
       <div id="hardModeChancesDisplay" style="font-size:28px; letter-spacing:4px; margin-bottom:4px;">❤️❤️❤️</div>
       <button onclick="checkHardModeAnswer()" style="padding:12px 40px; border-radius:12px; background:linear-gradient(135deg, #ff9a56, #ffb380); color:#1a0f0a; font-size:18px; font-weight:800; border:none; cursor:pointer; box-shadow:0 4px 12px rgba(255,154,86,0.4); transition:all 0.2s;">정답 확인</button>
       <div id="hardModeFeedback" style="font-size:15px; font-weight:600; min-height:24px; transition:all 0.3s;"></div>
     </div>

     <div style="display:flex; justify-content:center; gap: 8px; margin-top:20px;">
       <button onclick="resetBuildBits()" style="padding:10px 24px; border-radius:10px; border:1px solid #4a3225; background:#2d1f18; color:#8b6f47; font-size:13px; cursor:pointer; transition: 0.2s;">전부 끄기</button>
       <button onclick="generateBuildMission()" style="padding:10px 24px; border-radius:10px; border:1px solid #ff9a56; background:#ff9a5620; color:#ff9a56; font-size:13px; cursor:pointer; transition: 0.2s;">새 미션 받기</button>
     </div>
    </div>
   </div>

   <!-- QUIZ MODE -->
   <div id="mode-quiz" class="mode-section" style="padding:16px 20px; display:none;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
     <div style="font-size:14px; color:#8b6f47; display:flex; align-items:center;">
      정답: <span id="quizScore" style="color:#22c55e; font-weight:700; font-size:16px; margin: 0 4px;">0</span> / <span id="quizTotal" style="margin-left:4px;">0</span>
      <span id="quizCombo" style="margin-left:12px; color:#ef4444; font-weight:800; font-size:16px;"></span>
     </div>
     <div style="flex:1; margin:0 12px; height:8px; background:#2d1f18; border-radius:4px; overflow:hidden;">
      <div id="quizProgress" class="progress-fill" style="height:100%; background:linear-gradient(90deg,#ff9a56,#ffb380); width:0%; border-radius:4px;"></div>
     </div>
    </div>

    <!-- 퀴즈 타임어택 영역 (6콤보 이상) -->
    <div id="quizTimerArea" style="display:none; margin-bottom:16px; background:#2d1f18; padding:12px; border-radius:12px; border:1px solid #ff9a56;">
      <div style="display:flex; justify-content:space-between; font-size:15px; color:#ff9a56; font-weight:800; margin-bottom:6px;">
        <span>🔥 타임어택 모드!</span>
        <span id="quizTimerText">10.0초</span>
      </div>
      <div style="height:8px; background:#1a0f0a; border-radius:4px; overflow:hidden;">
        <div id="quizTimerBar" style="height:100%; width:100%; background:#ff9a56; transition: width 0.1s linear, background 0.3s;"></div>
      </div>
    </div>

    <div id="quizQuestion" style="text-align:center; background:#2d1f18; border-radius:16px; padding:24px 16px; border:1px solid #4a3225; margin-bottom:16px;"></div>
    
    <div id="quizOptions" style="display:grid; grid-template-columns:1fr 1fr; gap:10px;"></div>
    
    <!-- 콤보 칭호 타이틀 (5단계) -->
    <div id="quizComboTitleArea" style="text-align:center; margin-top:20px; min-height:48px; display:flex; justify-content:center; align-items:center;"></div>
    
    <div id="quizFeedback" style="text-align:center; margin-top:8px; min-height:48px;"></div>
   </div>

   <div class="creator-info">
    <p>행복한 수학, 함께 만들어요 😊<span class="sep">·</span>© 세종 중등수학교육 연구회 | 최OO 선생님</p>
   </div>
  </div>

  <script>
  /* ================= AUDIO SYSTEM ================= */
  const AudioContext = window.AudioContext || window.webkitAudioContext;
  let audioCtx = null;

  function initAudio() {
    if (!audioCtx) {
        audioCtx = new AudioContext();
        const buffer = audioCtx.createBuffer(1, 1, 22050);
        const source = audioCtx.createBufferSource();
        source.buffer = buffer;
        source.connect(audioCtx.destination);
        source.start(0);
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }

  document.addEventListener('click', initAudio, { once: true });
  document.addEventListener('touchstart', initAudio, { once: true });

  function playSound(type) {
    try {
      initAudio();
      if (!audioCtx) return;
      const now = audioCtx.currentTime;

      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      
      osc.connect(gain); 
      gain.connect(audioCtx.destination);

      if (type === 'tab') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(600, now);
        osc.frequency.exponentialRampToValueAtTime(800, now + 0.1);
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
        osc.start(now); osc.stop(now + 0.1);
      } 
      else if (type === 'electronic') {
        osc.type = 'square';
        osc.frequency.setValueAtTime(1200, now);
        osc.frequency.setValueAtTime(600, now + 0.05); 
        gain.gain.setValueAtTime(0.06, now);
        gain.gain.setValueAtTime(0.06, now + 0.05);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
        osc.start(now); osc.stop(now + 0.1);
      }
      else if (type === 'correct') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(440, now);
        osc.frequency.setValueAtTime(554.37, now + 0.1);
        osc.frequency.setValueAtTime(659.25, now + 0.2);
        gain.gain.setValueAtTime(0.15, now);
        gain.gain.linearRampToValueAtTime(0.15, now + 0.4);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.6);
        osc.start(now); osc.stop(now + 0.6);
      }
      else if (type === 'hard_correct') {
        osc.type = 'square';
        osc.frequency.setValueAtTime(523.25, now);       
        osc.frequency.setValueAtTime(659.25, now + 0.1); 
        osc.frequency.setValueAtTime(783.99, now + 0.2); 
        osc.frequency.setValueAtTime(1046.50, now + 0.3); 
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.linearRampToValueAtTime(0.1, now + 0.4);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.6);
        osc.start(now); osc.stop(now + 0.6);
      }
      else if (type === 'wrong') {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(200, now);
        osc.frequency.exponentialRampToValueAtTime(100, now + 0.3);
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
        osc.start(now); osc.stop(now + 0.3);
      }
      else if (type === 'switch') {
        osc.type = 'square';
        osc.frequency.setValueAtTime(300, now);
        osc.frequency.setValueAtTime(400, now + 0.05);
        gain.gain.setValueAtTime(0.05, now);
        gain.gain.linearRampToValueAtTime(0.01, now + 0.1);
        osc.start(now); osc.stop(now + 0.1);
      }
    } catch (e) {}
  }

  /* ================= STATE ================= */
  const BITS = 5; 
  let learnNum = 0; 
  let buildBits = [0,0,0,0,0];
  let prevBits = null;
  let isLearnInitialized = false;
  let isBuildInitialized = false;
  
  let isHardMode = false;
  let hardModeChances = 3; 
  let currentBuildMission = -1;
  let isCelebrating = false;
  let isRevealingAnswer = false; 

  let quizScore = 0;
  let quizTotal = 0;
  let quizCombo = 0; 
  let quizAnswer = null;
  let quizLocked = false;
  let quizTimerInterval = null; 
  
  const comboTitles = {
    2: "🌱 이진수 새싹",
    4: "🔍 이진수 탐색가",
    6: "🧙‍♂️ 이진수 마법사",
    8: "⚔️ 이진수 정복자",
    10: "👑 이진수 마스터!"
  };

  function toBinary(n) {
    const binary = n.toString(2).padStart(BITS, '0');
    return binary.split('').map(Number);
  }

  /* ================= MODE SWITCH ================= */
  function switchMode(mode) {
    playSound('tab');
    
    if (quizTimerInterval) {
        clearInterval(quizTimerInterval);
        document.getElementById('quizTimerArea').style.display = 'none';
    }

    ['learn', 'build', 'quiz'].forEach(m => {
      const el = document.getElementById('mode-' + m);
      const tab = document.getElementById('tab-' + m);
      
      if (m === mode) {
        el.style.display = 'block';
        el.classList.add('fade-in-up');
        tab.style.borderColor = '#ff9a56';
        tab.style.background = '#ff9a5620';
        tab.style.color = '#ff9a56';
      } else {
        el.style.display = 'none';
        el.classList.remove('fade-in-up');
        tab.style.borderColor = '#4a3225';
        tab.style.background = 'transparent';
        tab.style.color = '#8b6f47';
      }
    });

    if (mode === 'build' && !isBuildInitialized) {
      generateBuildMission();
      isBuildInitialized = true;
    }
    if (mode === 'quiz' && quizTotal === 0) {
      generateQuiz();
    }
  }

  /* ================= 1. LEARN MODE ================= */
  function changeLearnNum(d) {
    let nextNum = learnNum + d;
    if (nextNum < 0) nextNum = 31;
    if (nextNum > 31) nextNum = 0;
    
    learnNum = nextNum;
    renderLearn(); 
  }

  function renderLearn() {
    document.getElementById('learnNumDisplay').textContent = learnNum;
    document.getElementById('learnNumDisplay').classList.remove('number-pop');
    void document.getElementById('learnNumDisplay').offsetWidth;
    document.getElementById('learnNumDisplay').classList.add('number-pop');

    const bits = toBinary(learnNum);
    const container = document.getElementById('learnCards');

    if (!isLearnInitialized) {
      container.innerHTML = '';
      for (let i = 0; i < BITS; i++) {
        const card = document.createElement('div');
        card.className = 'card-flip flip-in';
        card.style.width = '140px';
        card.style.height = '180px';
        card.style.flexDirection = 'column';
        card.style.gap = '8px';
        
        const bitDisplay = document.createElement('div');
        bitDisplay.className = 'bit-text';

        const valDisplay = document.createElement('div');
        valDisplay.className = 'val-text';
        valDisplay.style.fontSize = '20px';
        valDisplay.style.fontWeight = '600';

        card.appendChild(bitDisplay);
        card.appendChild(valDisplay);
        container.appendChild(card);
      }
      isLearnInitialized = true;
    }

    const cards = container.children;
    const parts = [];

    bits.forEach((bit, i) => {
      const power = BITS - 1 - i;
      const val = Math.pow(2, power);
      const isOn = bit === 1;
      const card = cards[i];

      if (prevBits && bit !== prevBits[i]) {
        card.classList.remove('card-state-change');
        void card.offsetWidth; 
        card.classList.add('card-state-change');
      }

      setTimeout(() => {
        card.style.background = isOn ? 'linear-gradient(145deg, #ff9a56, #ffb380)' : '#2d1f18';
        card.style.border = isOn ? 'none' : '2px solid #4a3225';
        card.style.color = isOn ? '#fff' : '#8b6f47';
        card.style.boxShadow = isOn ? '0 4px 16px rgba(255, 154, 86, 0.3)' : 'none';
        
        card.querySelector('.bit-text').textContent = bit;
        card.querySelector('.val-text').textContent = val;
      }, prevBits && bit !== prevBits[i] ? 200 : 0);

      if (isOn) parts.push(val);
    });

    prevBits = bits;

    const explain = document.getElementById('learnExplain');
    const binaryStr = bits.join('');
    explain.innerHTML = `
      <div style="text-align:center; margin-bottom:16px;">
        <span class="explain-binary">${binaryStr}</span>
        <sub style="color:#8b6f47; font-size:14px;">₂</sub>
      </div>
      <div style="text-align:center; font-family:'JetBrains Mono',monospace; font-size:20px; color:#8b6f47; line-height:1.8;">
        ${parts.length > 0 ? parts.join(' + ') + ' = <span style="color:#fff8f0;font-weight:700; font-size:32px;">' + learnNum + '</span>' : '0'}
      </div>
    `;
  }

  /* ================= 2. BUILD MODE ================= */
  function toggleHardMode() {
    playSound('switch');
    isHardMode = !isHardMode;
    const btn = document.getElementById('hardModeBtn');
    
    if (isHardMode) {
      btn.innerHTML = '🔥 하드 모드 ON';
      btn.style.background = '#ef444420';
      btn.style.color = '#ef4444';
      btn.style.borderColor = '#ef4444';
      btn.style.transform = 'scale(1.05)';
      
      document.getElementById('normalModeArea').style.display = 'none';
      document.getElementById('hardModeArea').style.display = 'flex';
      
      generateBuildMission(); 
    } else {
      btn.innerHTML = '🔥 하드 모드 OFF';
      btn.style.background = 'transparent';
      btn.style.color = '#8b6f47';
      btn.style.borderColor = '#4a3225';
      btn.style.transform = 'scale(1)';
      
      document.getElementById('normalModeArea').style.display = 'block';
      document.getElementById('hardModeArea').style.display = 'none';
      updateBuildDisplay();
    }
    renderBuildCards(); 
  }

  function generateBuildMission() {
    playSound('tab');
    
    let nextMission;
    do {
      nextMission = Math.floor(Math.random() * 31) + 1;
    } while (nextMission === currentBuildMission);
    
    currentBuildMission = nextMission;
    
    const targetEl = document.getElementById('missionTarget');
    targetEl.textContent = currentBuildMission;
    targetEl.classList.remove('number-pop');
    void targetEl.offsetWidth;
    targetEl.classList.add('number-pop');

    if (isHardMode) {
      hardModeChances = 3;
      updateLivesDisplay();
      document.getElementById('hardModeFeedback').textContent = '';
    }

    resetBuildBits(); 
  }

  function updateLivesDisplay() {
    const livesEl = document.getElementById('hardModeChancesDisplay');
    if (!livesEl) return;
    
    let hearts = '';
    for(let i=0; i<3; i++) {
        hearts += (i < hardModeChances) ? '❤️' : '🤍';
    }
    livesEl.textContent = hearts;
    
    livesEl.classList.remove('number-pop');
    void livesEl.offsetWidth;
    livesEl.classList.add('number-pop');
  }

  function resetBuildBits() {
    if (isCelebrating) return;
    buildBits = [0,0,0,0,0];
    renderBuildCards();
    updateBuildDisplay();
  }

  function renderBuildCards() {
    const container = document.getElementById('buildCards');
    
    if (container.children.length === 0) {
      buildBits.forEach((bit, i) => {
        const card = document.createElement('div');
        card.className = 'bit-card flip-in';
        card.style.animationDelay = `${i * 0.08}s`; 
        card.style.cssText += `
          width:140px; height:180px; border-radius:16px; cursor:pointer; display:flex; flex-direction:column;
          align-items:center; justify-content:center; gap:8px; user-select:none; padding: 10px;
        `;
        
        card.innerHTML = `
          <div class="power-div" style="font-size:14px; transition:all 0.3s; height:20px; display:flex; align-items:center;">2<sup class="power-text"></sup></div>
          <div class="build-bit-text" style="font-family:'JetBrains Mono',monospace; font-size:48px; font-weight:700; transition:all 0.3s; line-height:1;">0</div>
          <div class="val-text" style="font-size:20px; font-weight:600; transition:all 0.3s; height:24px; display:flex; align-items:center;"></div>
        `;
        
        card.onclick = () => handleBuildCardClick(i, card);
        container.appendChild(card);
      });
    }

    const cards = container.children;
    buildBits.forEach((bit, i) => {
      const power = BITS - 1 - i;
      const val = Math.pow(2, power);
      const isOn = bit === 1;
      const card = cards[i];

      card.classList.remove('reveal-active', 'reveal-inactive', 'active');
      card.style.boxShadow = 'none';

      if (isRevealingAnswer) {
          if (isOn) {
              card.classList.add('reveal-active');
          } else {
              card.classList.add('reveal-inactive');
          }
      } else {
          card.style.background = isOn ? 'linear-gradient(145deg,#ff9a56,#ffb380)' : '#2d1f18';
          card.style.border = isOn ? 'none' : '2px solid #4a3225';
          card.style.color = isOn ? '#fff' : '#8b6f47';
          if (isOn) {
            card.classList.add('active');
            card.style.boxShadow = '0 0 24px rgba(255, 154, 86, 0.4)';
          }
      }

      const powerDiv = card.querySelector('.power-div');
      const valText = card.querySelector('.val-text');
      const bitText = card.querySelector('.build-bit-text');
      
      powerDiv.querySelector('.power-text').textContent = power;
      bitText.textContent = bit;
      valText.textContent = val;

      if (isHardMode || isRevealingAnswer) {
        powerDiv.style.opacity = '0';
        valText.style.opacity = '0';
        bitText.style.transform = 'scale(1.4)';
      } else {
        powerDiv.style.opacity = '0.7';
        valText.style.opacity = '1';
        bitText.style.transform = 'scale(1)';
      }
    });
  }

  function handleBuildCardClick(i, card) {
    if (isCelebrating || isRevealingAnswer) return; 
    playSound('electronic'); 
    
    card.style.transform = 'scale(0.92)';
    setTimeout(() => { card.style.transform = ''; }, 150);

    buildBits[i] = buildBits[i] === 0 ? 1 : 0;
    renderBuildCards();
    updateBuildDisplay();
  }

  function updateBuildDisplay() {
    let total = 0;
    const parts = [];
    buildBits.forEach((bit, idx) => {
      if (bit === 1) {
        const v = Math.pow(2, BITS - 1 - idx);
        total += v;
        parts.push(String(v));
      }
    });
    
    const resEl = document.getElementById('buildResult');
    resEl.textContent = total;
    resEl.classList.remove('number-pop');
    void resEl.offsetWidth;
    resEl.classList.add('number-pop');

    document.getElementById('buildFormula').textContent = parts.length > 0 ? parts.join(' + ') + ' = ' + total : '비트를 클릭해 불을 켜세요!';

    if (!isHardMode && total === currentBuildMission && !isCelebrating && currentBuildMission > 0) {
      missionSuccess();
    }
  }

  function checkHardModeAnswer() {
    if (isCelebrating || !isHardMode || isRevealingAnswer) return;
    
    let total = 0;
    buildBits.forEach((bit, i) => { 
        if (bit === 1) total += Math.pow(2, BITS - 1 - i); 
    });
    
    const fb = document.getElementById('hardModeFeedback');

    if (total === currentBuildMission) {
        fb.textContent = '';
        missionSuccess(); 
    } else {
        hardModeChances--;
        updateLivesDisplay();
        
        const container = document.getElementById('buildCards');
        container.classList.remove('shake');
        void container.offsetWidth;
        container.classList.add('shake');

        if (hardModeChances > 0) {
            playSound('wrong');
            fb.textContent = '아앗, 틀렸어요! 다시 계산해 보세요.';
            fb.style.color = '#ef4444';
            fb.classList.remove('number-pop');
            void fb.offsetWidth;
            fb.classList.add('number-pop');
        } else {
            playSound('wrong');
            fb.textContent = '기회를 모두 사용했어요! 정답을 확인하세요.';
            fb.style.color = '#ff9a56'; 
            showCorrectAnswer();
        }
    }
  }

  function showCorrectAnswer() {
      isCelebrating = true; 
      isRevealingAnswer = true;
      
      const correctBits = toBinary(currentBuildMission);
      buildBits = [...correctBits];
      renderBuildCards(); 
      
      setTimeout(() => {
          isCelebrating = false;
          isRevealingAnswer = false;
          generateBuildMission(); 
      }, 3500); 
  }

  function missionSuccess() {
    isCelebrating = true;
    
    if(isHardMode) { playSound('hard_correct'); } 
    else { playSound('correct'); }
    
    if (window.confetti) {
      const duration = 1500;
      const end = Date.now() + duration;
      (function frame() {
        confetti({ particleCount: 6, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#ff9a56', '#22c55e', '#38bdf8', '#ffffff'] });
        confetti({ particleCount: 6, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#ff9a56', '#22c55e', '#38bdf8', '#ffffff'] });
        if (Date.now() < end) requestAnimationFrame(frame);
      }());
    }

    const md = document.getElementById('missionDisplay');
    md.style.background = '#22c55e20';
    md.style.borderColor = '#22c55e';
    md.style.color = '#22c55e';
    md.innerHTML = '🎉 목표 달성! 완벽해요!';
    md.classList.add('success-pulse');

    if(isHardMode) {
      document.getElementById('hardModeFeedback').textContent = '';
    }

    setTimeout(() => {
      md.classList.remove('success-pulse');
      md.style.background = '#2d1f18';
      md.style.borderColor = '#ff9a56';
      md.style.color = '#ff9a56';
      md.innerHTML = `🎯 목표: <span id="missionTarget" style="font-size:24px; margin: 0 8px;"></span> 일 만들기`;
      
      isCelebrating = false;
      generateBuildMission(); 
    }, 1800);
  }

  /* ================= 3. QUIZ MODE & TIMER ================= */
  function startQuizTimer() {
    if (quizTimerInterval) clearInterval(quizTimerInterval);
    const timerArea = document.getElementById('quizTimerArea');
    
    if (quizCombo < 6) {
        timerArea.style.display = 'none';
        return;
    }
    
    timerArea.style.display = 'block';
    let timeLeft = 10.0;
    const timerText = document.getElementById('quizTimerText');
    const timerBar = document.getElementById('quizTimerBar');
    
    timerText.style.color = '#ff9a56';
    timerBar.style.background = '#ff9a56';

    quizTimerInterval = setInterval(() => {
        if (quizLocked) {
            clearInterval(quizTimerInterval);
            return;
        }
        
        timeLeft -= 0.1;
        if (timeLeft <= 0) {
            timeLeft = 0;
            clearInterval(quizTimerInterval);
            checkAnswer(null, null, true); 
        }
        
        timerText.textContent = timeLeft.toFixed(1) + '초';
        timerBar.style.width = (timeLeft / 10) * 100 + '%';

        if (timeLeft <= 3.0) {
            timerText.style.color = '#ef4444';
            timerBar.style.background = '#ef4444';
        }
    }, 100);
  }

  function generateQuiz() {
    quizLocked = false;
    document.getElementById('quizFeedback').innerHTML = '';

    const type = Math.random() > 0.5 ? 'toDecimal' : 'toBinary';
    const num = Math.floor(Math.random() * 31) + 1; 
    const binary = num.toString(2).padStart(BITS, '0');

    const qEl = document.getElementById('quizQuestion');

    if (type === 'toDecimal') {
      qEl.innerHTML = `
        <div style="font-size:16px; font-weight:700; color:#ffb380; margin-bottom:8px;">이 이진수는 십진수로 얼마일까요?</div>
        <div class="quiz-binary">${binary}</div>
      `;
      quizAnswer = num;
      const options = generateOptions(num, 1, 31);
      renderOptions(options, v => v);
    } else {
      qEl.innerHTML = `
        <div style="font-size:16px; font-weight:700; color:#ffb380; margin-bottom:8px;">숫자 ${num}을(를) 이진수로 나타내면?</div>
        <div class="quiz-decimal">${num}</div>
      `;
      quizAnswer = binary;
      const optionsNum = generateOptions(num, 1, 31);
      const optionsBin = optionsNum.map(n => n.toString(2).padStart(BITS, '0'));
      renderOptions(optionsBin, v => v);
    }
    
    startQuizTimer();
  }

  function generateOptions(correct, min, max) {
    const set = new Set([correct]);
    const bitFlips = [1, 2, 4, 8, 16]; 
    
    let shuffledFlips = [...bitFlips].sort(() => Math.random() - 0.5);
    for (let bit of shuffledFlips) {
      if (set.size >= 4) break;
      let distractor = correct ^ bit; 
      if (distractor >= min && distractor <= max) {
        set.add(distractor);
      }
    }
    
    while (set.size < 4) {
      let r = Math.floor(Math.random() * max) + min;
      set.add(r);
    }
    
    return [...set].sort(() => Math.random() - 0.5);
  }

  function renderOptions(options, display) {
    const oEl = document.getElementById('quizOptions');
    oEl.innerHTML = '';
    options.forEach((opt, idx) => {
      const btn = document.createElement('button');
      btn.className = 'flip-in';
      btn.style.animationDelay = `${idx * 0.1}s`; 
      btn.style.cssText += `
        padding:16px; border-radius:12px; border:2px solid #6b5344; background:#2d1f18;
        color:#f5ede5; font-family:'JetBrains Mono',monospace; font-size:20px; font-weight:600;
        cursor:pointer; transition:all 0.2s;
      `;
      btn.textContent = display(opt);
      
      btn.onmouseenter = () => { if(!quizLocked) btn.style.transform = 'scale(1.03)'; };
      btn.onmouseleave = () => { if(!quizLocked) btn.style.transform = 'scale(1)'; };
      btn.onclick = () => {
        btn.style.transform = 'scale(0.95)';
        setTimeout(() => checkAnswer(opt, btn, false), 100);
      };
      
      oEl.appendChild(btn);
    });
  }

  function checkAnswer(selected, btn, isTimeout = false) {
    if (quizLocked) return;
    quizLocked = true;
    if (quizTimerInterval) clearInterval(quizTimerInterval); 
    
    quizTotal++;

    if(btn) btn.style.transform = 'scale(1)';
    const isCorrect = !isTimeout && (String(selected) === String(quizAnswer));
    let nextDelay = 2500; 

    const isAnsBinaryStr = typeof quizAnswer === 'string'; 
    const binary = isAnsBinaryStr ? quizAnswer : quizAnswer.toString(2).padStart(BITS, '0');
    const decimal = isAnsBinaryStr ? parseInt(quizAnswer, 2) : quizAnswer;
    
    const bits = binary.split('').reverse();
    const parts = [];
    let total = 0;
    bits.forEach((bit, power) => {
      if (bit === '1') {
        const val = Math.pow(2, power);
        total += val;
        parts.push(String(val));
      }
    });

    const explanation = `
      <div class="fade-in-up" style="color:#94a3b8; font-size:14px; line-height:1.8; margin-top:8px;">
        <div>이진수 <span style="color:#38bdf8; font-weight:700;">${binary}</span> = 십진수 <span style="color:#22c55e; font-weight:700;">${decimal}</span></div>
        <div style="margin-top:4px;">${parts.join(' + ')} = ${total}</div>
      </div>
    `;

    if (isCorrect) {
      quizScore++;
      quizCombo++; 
      playSound('correct');
      if(window.confetti) confetti({ particleCount: 30, spread: 60, origin: { y: 0.8 }, colors: ['#22c55e', '#ff9a56'] });

      btn.style.borderColor = '#22c55e';
      btn.style.background = '#22c55e20';
      btn.style.color = '#22c55e';
      
      document.getElementById('quizFeedback').innerHTML = `
        <div class="number-pop" style="color:#22c55e; font-size:20px; font-weight:700;">🎉 정답!</div>
        ${explanation}
      `;
    } else {
      nextDelay = 4000; 
      quizCombo = 0; 
      playSound('wrong');
      
      const oEl = document.getElementById('quizOptions');
      oEl.classList.remove('shake');
      void oEl.offsetWidth;
      oEl.classList.add('shake');

      if (btn) {
          btn.style.borderColor = '#ef4444';
          btn.style.background = '#ef444420';
          btn.style.color = '#ef4444';
      }
      
      [...document.getElementById('quizOptions').children].forEach(b => {
        if (b.textContent === String(quizAnswer)) {
          b.style.borderColor = '#22c55e';
          b.style.background = '#22c55e20';
          b.style.color = '#22c55e';
          b.classList.add('success-pulse');
        }
      });
      
      const wrongReasonText = isTimeout ? "시간 초과!" : "아앗, 틀렸어요!";
      
      document.getElementById('quizFeedback').innerHTML = `
        <div class="number-pop" style="color:#ef4444; font-size:18px; font-weight:600;">${wrongReasonText} 정답은 <span style="color:#22c55e;">${quizAnswer}</span> 이에요</div>
        ${explanation}
        <div style="margin-top:12px; font-size:12px; color:#8b6f47;">잠시 후 다음 문제로 넘어갑니다...</div>
      `;
    }

    document.getElementById('quizScore').textContent = quizScore;
    document.getElementById('quizTotal').textContent = quizTotal;
    
    const comboEl = document.getElementById('quizCombo');
    const titleArea = document.getElementById('quizComboTitleArea');
    
    if (quizCombo >= 2) {
      comboEl.textContent = `🔥 ${quizCombo} COMBO!`;
      comboEl.classList.remove('combo-pop');
      void comboEl.offsetWidth;
      comboEl.classList.add('combo-pop');
      
      let titleLevel = Math.floor(quizCombo / 2) * 2;
      if (titleLevel > 10) titleLevel = 10;
      
      if (comboTitles[titleLevel]) {
        titleArea.innerHTML = `<div class="title-pop" style="background:rgba(255, 154, 86, 0.15); border:2px solid #ff9a56; color:#ff9a56; padding:8px 24px; border-radius:24px; font-size:18px; font-weight:800; box-shadow:0 4px 12px rgba(255, 154, 86, 0.3);">
          ${comboTitles[titleLevel]}
        </div>`;
      }
    } else {
      comboEl.textContent = '';
      titleArea.innerHTML = '';
    }
    
    const scoreEl = document.getElementById('quizScore');
    scoreEl.classList.remove('number-pop');
    void scoreEl.offsetWidth;
    scoreEl.classList.add('number-pop');
    
    document.getElementById('quizProgress').style.width = `${(quizScore/Math.max(quizTotal,1))*100}%`;

    setTimeout(generateQuiz, nextDelay);
  }

  // 앱 로드 시 최초 실행
  renderLearn();
  </script>
 </body>
