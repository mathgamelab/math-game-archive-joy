<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <!-- Gemini API가 Referer를 검사하므로, 출처(origin)를 전달하도록 설정 -->
    <meta name="referrer" content="origin" />
    <title>AI Phone English</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📞</text></svg>" />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; }
      body {
        font-family: 'Pretendard Variable', 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overscroll-behavior: none;
        background: #0f0f10;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        min-height: 100%;
      }
      #root {
        width: 100%;
        max-width: 390px;
        min-height: 100vh;
        height: 100%;
        margin: 0 auto;
        background: #fff;
        box-shadow: 0 0 0 1px rgba(255,255,255,.06), 0 24px 48px rgba(0,0,0,.4);
      }
      @media (max-width: 390px) {
        #root { max-width: 100%; box-shadow: none; }
      }
      input::placeholder { color: #a1a1aa; }
      @keyframes spin { to { transform: rotate(360deg) } }
      @keyframes fadeUp { from { opacity:0; transform:translateY(6px) } to { opacity:1; transform:translateY(0) } }
      @keyframes pulse2 { 0%,100%{transform:scale(1);opacity:.35} 50%{transform:scale(1.55);opacity:0} }
      @keyframes dotB { 0%,80%,100%{transform:scale(.5);opacity:.3} 40%{transform:scale(1);opacity:1} }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
