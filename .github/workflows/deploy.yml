# .github/workflows/deploy.yml
name: Build & Deploy to GitHub Pages

permissions:
  contents: write

on:
  push:
    branches:
      - main      # main 브랜치에 푸시될 때만 동작

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1) 레포를 체크아웃
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2) 노드 환경 설정
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '24.x'

      # 3) 의존성 설치 (workspace 자동 처리)
      - name: Install dependencies
        run: npm install
      
      # 3-1) apps/airing/main 의존성 설치 (workspace가 아니므로 별도 설치)
      - name: Install airing/main dependencies
        working-directory: apps/airing/main
        run: npm install

      # 4) 모든 앱 빌드
      # - edugame_builder 빌드 (public/edugame_builder/에 출력)
      # - main 빌드 (dist/에 출력, public/ 내용 포함)
      # - airing 빌드 (public/airing/에 출력)
      - name: Build edugame_builder
        run: npm run build:edugame-builder
      
      - name: Build main (airing/main)
        working-directory: apps/airing/main
        run: npm run build
      
      - name: Build airing
        run: npm run build:airing

      # 5) public/ 폴더의 빌드 결과를 dist/로 복사
      - name: Copy public builds to dist
        run: |
          if [ -d "public/airing" ]; then
            cp -r public/airing dist/
            echo "✓ Copied public/airing to dist/"
          fi
          if [ -d "public/edugame_builder" ]; then
            cp -r public/edugame_builder dist/
            echo "✓ Copied public/edugame_builder to dist/"
          fi

      # 6) 기존 docs/ 삭제 후 dist/을 docs/로 이동
      - name: Prepare docs folder
        run: |
          rm -rf docs
          mv dist docs
          cp CNAME docs/CNAME

      # 7) 변경된 docs/를 커밋·푸시
      - name: Commit and Push docs
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "ci(deploy): update GitHub Pages"
          file_pattern: docs/**
