
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduGame Builder</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel=stylesheet>
  <style>
    :root {
      --mga-primary: #1e293b;
      --mga-primary-hover: #0f172a;
      --mga-accent: #6f8f72;
      --mga-accent-soft: #e8f0e8;
      --mga-canvas: #f8faf8;
      --mga-card: #ffffff;
      --mga-border: #e2e8e4;
      --mga-muted: #64748b;
      --mga-clay: #f1f5f2;
      --mga-shadow: 0 10px 28px rgba(30, 41, 59, .08), 0 2px 6px rgba(30, 41, 59, .05);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      scroll-behavior: smooth;
      background: var(--mga-canvas);
      color: var(--mga-primary);
    }
    button, input, textarea { font: inherit; }
    button:focus-visible, a:focus-visible, input:focus-visible, textarea:focus-visible {
      outline: 3px solid rgba(111, 143, 114, .35);
      outline-offset: 2px;
    }
    .page-shell { background: var(--mga-canvas); }
    .bg-primary { background: var(--mga-primary); }
    .shadow-modal { box-shadow: 0 18px 50px rgba(15, 23, 42, .22); }
    .primary-button, .secondary-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: .8rem;
      font-weight: 700;
      transition: transform .18s ease, background .18s ease, box-shadow .18s ease;
    }
    .primary-button {
      border: 1px solid var(--mga-primary);
      background: var(--mga-primary);
      color: white;
      box-shadow: 0 6px 16px rgba(30, 41, 59, .18);
    }
    .primary-button:hover { background: var(--mga-primary-hover); transform: translateY(-1px); }
    .secondary-button {
      border: 1px solid var(--mga-border);
      background: white;
      color: var(--mga-primary);
    }
    .secondary-button:hover { background: var(--mga-clay); }

    main .rounded-3xl.bg-white,
    main .rounded-2xl.bg-white {
      border-color: var(--mga-border) !important;
      border-width: 1px !important;
      box-shadow: var(--mga-shadow) !important;
    }
    main textarea, main input[type="text"] {
      border-color: var(--mga-border) !important;
      background: #fbfcfb;
    }
    main textarea:focus, main input[type="text"]:focus {
      border-color: var(--mga-accent) !important;
      box-shadow: 0 0 0 3px rgba(111, 143, 114, .14);
    }
    main [class*="text-orange-"],
    main [class*="text-blue-"],
    main [class*="text-indigo-"],
    main [class*="text-purple-"] { color: var(--mga-accent) !important; }
    main button[class*="bg-gradient-to-"],
    main button[class*="bg-blue-6"],
    main button[class*="bg-purple-6"] {
      background: var(--mga-primary) !important;
      border-color: var(--mga-primary) !important;
      color: white !important;
    }
    main button[class*="bg-gradient-to-"]:hover,
    main button[class*="bg-blue-6"]:hover,
    main button[class*="bg-purple-6"]:hover { background: var(--mga-primary-hover) !important; }
    main [class*="border-orange-"],
    main [class*="border-blue-"],
    main [class*="border-purple-"] { border-color: var(--mga-accent) !important; }
    main [class*="ring-orange-"],
    main [class*="ring-blue-"] { --tw-ring-color: rgba(111, 143, 114, .2) !important; }
    main [class*="bg-orange-50"],
    main [class*="bg-blue-50"],
    main [class*="bg-purple-50"] { background-color: var(--mga-accent-soft) !important; }
    }
    @keyframes twinkle {
      0%, 100% { box-shadow: 0 0 0 0 rgba(111, 143, 114, 0); transform: scale(1); }
      50% { box-shadow: 0 0 18px 7px rgba(111, 143, 114, .28); transform: scale(1.08); }
    }
    .animate-twinkle {
      animation: twinkle 1.5s ease-in-out infinite;
    }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    .custom-scrollbar::-webkit-scrollbar { width: 8px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: #f8fafc; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; border: 2px solid #f8fafc; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }
  </style>
  <script type="module" crossorigin src="/edugame_builder/assets/index-D2-idTVs.js"></script>
</head>
<body class="antialiased ">
  <div id="root"></div>

</body>
</html>
