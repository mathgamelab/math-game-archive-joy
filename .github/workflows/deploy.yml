# .github/workflows/deploy.yml
name: Build & Deploy to GitHub Pages

permissions:
  contents: write

on:
  push:
    branches:
      - main      # main 브랜치에 푸시될 때만 동작

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1) 레포를 체크아웃
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2) 노드 환경 설정
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '24.x'

      # 3) 의존성 설치 (workspace 자동 처리)
      - name: Install dependencies
        run: npm install
      
      # 3-1) apps/airing/main 의존성 설치 (workspace가 아니므로 별도 설치)
      - name: Install airing/main dependencies
        working-directory: apps/airing/main
        run: npm install

      # 4) dist/ 폴더 생성 및 public/ 정적 파일 복사
      - name: Copy public static files to dist
        run: |
          mkdir -p dist
          # public/의 HTML 파일들과 기타 정적 파일들 복사
          # (airing/, edugame_builder/ 폴더는 빌드 결과물이므로 제외)
          cp public/*.html dist/ 2>/dev/null || true
          cp -r public/images dist/ 2>/dev/null || true
          cp -r public/videos dist/ 2>/dev/null || true
          cp public/robots.txt dist/ 2>/dev/null || true
          cp public/placeholder.svg dist/ 2>/dev/null || true
          echo "✓ Copied public static files to dist/"

      # 5) 모든 앱 빌드
      # 빌드 순서: edugame_builder → main → airing
      # - edugame_builder: public/edugame_builder/에 출력
      # - main: dist/main/에 출력 (dist/의 기존 파일 유지)
      # - airing: public/airing/에 출력
      - name: Build edugame_builder
        run: npm run build:edugame-builder
      
      - name: Build main (airing/main)
        working-directory: apps/airing/main
        run: npm run build
      
      - name: Build airing
        run: npm run build:airing

      # 6) main 빌드 결과를 dist/ 루트로 복사
      # dist/main/index.html → dist/index.html (메인 페이지)
      - name: Copy main build to dist root
        run: |
          if [ -f "dist/main/index.html" ]; then
            cp dist/main/index.html dist/index.html
            # assets 폴더 병합 (기존 assets가 있을 수 있음)
            if [ -d "dist/main/assets" ]; then
              cp -r dist/main/assets/* dist/assets/ 2>/dev/null || mkdir -p dist/assets && cp -r dist/main/assets/* dist/assets/
            fi
            echo "✓ Copied main build to dist/ root"
          else
            echo "⚠ Warning: dist/main/index.html not found!"
            exit 1
          fi

      # 7) public/ 폴더의 빌드 결과를 dist/로 복사
      # airing과 edugame_builder 앱을 dist/ 하위로 복사
      - name: Copy public builds to dist
        run: |
          if [ -d "public/airing" ]; then
            cp -r public/airing dist/
            echo "✓ Copied public/airing to dist/"
          else
            echo "⚠ Warning: public/airing not found!"
          fi
          if [ -d "public/edugame_builder" ]; then
            cp -r public/edugame_builder dist/
            echo "✓ Copied public/edugame_builder to dist/"
          else
            echo "⚠ Warning: public/edugame_builder not found!"
          fi

      # 8) dist/를 docs/로 이동 (GitHub Pages 배포)
      # 기존 docs/ 삭제 후 dist/ 내용을 docs/로 이동
      - name: Prepare docs folder for GitHub Pages
        run: |
          rm -rf docs
          mv dist docs
          # CNAME 파일 복사 (도메인 설정)
          if [ -f "CNAME" ]; then
            cp CNAME docs/CNAME
          fi
          echo "✓ Prepared docs/ folder for deployment"

      # 9) 변경된 docs/를 커밋·푸시
      - name: Commit and Push docs
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "ci(deploy): update GitHub Pages"
          file_pattern: docs/**
